<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Погода - Cyberpunk</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page">
        <div class="wrap">
            <!-- Пошук -->
            <div class="searchWrap">
                <div class="searchBox">
                    <span class="searchIcon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="m21 21-4.3-4.3"/>
                        </svg>
                    </span>
                    <input 
                        type="text" 
                        id="cityInput" 
                        class="searchInput" 
                        placeholder="ШИФР МІСТА..."
                        autocomplete="off"
                    >
                    <button class="unitToggle" id="unitToggle">°C</button>
                </div>
                <div class="dropdown" id="dropdown"></div>
            </div>

            <!-- Картка погоди -->
            <div class="card" id="weatherCard">
                <div class="hero">
                    <div class="city" id="cityName">КИЇВ, UA</div>
                    <div class="temp" id="temperature">21°</div>
                    <div class="condition" id="condition">Хмарно з проясненнями</div>
                    <div class="hiLo">
                        <span class="hiLoItem">▲ <span id="highTemp">24°</span></span>
                        <span class="hiLoItem">▼ <span id="lowTemp">18°</span></span>
                    </div>
                </div>

                <hr class="divider">

                <div class="stats">
                    <div class="stat">
                        <span class="statIcon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                            </svg>
                        </span>
                        <span class="statLabel">Вологість</span>
                        <span class="statValue" id="humidity">65%</span>
                    </div>
                    <div class="stat">
                        <span class="statIcon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M12 2C8 2 4.5 4.5 4.5 9c0 3.5 3 6 7.5 9 4.5-3 7.5-5.5 7.5-9 0-4.5-3.5-7-7.5-7z"/>
                            </svg>
                        </span>
                        <span class="statLabel">Вітер</span>
                        <span class="statValue" id="windSpeed">5 м/с</span>
                    </div>
                    <div class="stat">
                        <span class="statIcon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <circle cx="12" cy="12" r="3"/>
                                <path d="M12 22C8 22 4 18 4 12S8 2 12 2s8 4 8 8-4 8-8 8z"/>
                            </svg>
                        </span>
                        <span class="statLabel">Видимість</span>
                        <span class="statValue" id="visibility">10 км</span>
                    </div>
                </div>

                <hr class="divider">

                <div class="weekly" id="weeklyForecast">
                    <div class="weekRow">
                        <span class="weekDay">ПН</span>
                        <span class="weekIcon">☀️</span>
                        <span class="weekTemps">
                            <span class="weekHigh">22°</span>
                            <span class="weekLow">15°</span>
                        </span>
                    </div>
                    <div class="weekRow">
                        <span class="weekDay">ВТ</span>
                        <span class="weekIcon">⛅</span>
                        <span class="weekTemps">
                            <span class="weekHigh">20°</span>
                            <span class="weekLow">14°</span>
                        </span>
                    </div>
                    <div class="weekRow">
                        <span class="weekDay">СР</span>
                        <span class="weekIcon">🌧️</span>
                        <span class="weekTemps">
                            <span class="weekHigh">18°</span>
                            <span class="weekLow">13°</span>
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
