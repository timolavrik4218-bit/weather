<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌤️ Погода</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🌤️ Погода</h1>
        
        <div class="search">
            <input type="text" id="cityInput" placeholder="Введіть місто...">
            <button onclick="getWeather()">🔍</button>
        </div>

        <div class="weather-card" id="weatherCard">
            <h2 id="cityName">Київ</h2>
            <div class="temp" id="temperature">21°C</div>
            <div class="desc" id="description">Хмарно</div>
            <div class="details">
                <span>💧 <span id="humidity">65%</span></span>
                <span>💨 <span id="wind">5 м/с</span></span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
